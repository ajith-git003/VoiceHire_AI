<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="8" fill="#07091a"/>
  <!-- Microphone body -->
  <rect x="12" y="5" width="8" height="13" rx="4" fill="#00c866"/>
  <!-- Microphone arc -->
  <path d="M8 16a8 8 0 0 0 16 0" stroke="#00c866" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Stand line -->
  <line x1="16" y1="24" x2="16" y2="28" stroke="#00c866" stroke-width="2" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="11" y1="28" x2="21" y2="28" stroke="#00c866" stroke-width="2" stroke-linecap="round"/>
</svg>
